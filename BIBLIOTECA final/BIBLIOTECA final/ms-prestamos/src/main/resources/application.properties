spring.application.name=ms-prestamos
server.port=8084

eureka.client.service-url.defaultZone=http://localhost:8080/eureka/

spring.datasource.url=jdbc:mysql://localhost:3307/bd_prestamos
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Resilience4j: reintentos y circuit breaker
management.endpoints.web.exposure.include=health,info,circuitbreakers,retries
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.health.ratelimiters.enabled=true

resilience4j.retry.instances.pagosService.max-attempts=3
resilience4j.retry.instances.pagosService.wait-duration=1s
resilience4j.retry.instances.librosService.max-attempts=3
resilience4j.retry.instances.librosService.wait-duration=1s
resilience4j.retry.instances.prestamosService.max-attempts=3
resilience4j.retry.instances.prestamosService.wait-duration=1s

resilience4j.circuitbreaker.instances.pagosService.register-health-indicator=true
resilience4j.circuitbreaker.instances.pagosService.sliding-window-size=5
resilience4j.circuitbreaker.instances.pagosService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.pagosService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.pagosService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.pagosService.permitted-number-of-calls-in-half-open-state=2

resilience4j.circuitbreaker.instances.librosService.register-health-indicator=true
resilience4j.circuitbreaker.instances.librosService.sliding-window-size=5
resilience4j.circuitbreaker.instances.librosService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.librosService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.librosService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.librosService.permitted-number-of-calls-in-half-open-state=2

resilience4j.circuitbreaker.instances.prestamosService.register-health-indicator=true
resilience4j.circuitbreaker.instances.prestamosService.sliding-window-size=5
resilience4j.circuitbreaker.instances.prestamosService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.prestamosService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.prestamosService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.prestamosService.permitted-number-of-calls-in-half-open-state=2
